<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Stoic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="noise"></div>

    <main class="main">
      <div class="card-scene">
        <div class="card" id="card">
          <div class="loading-state" id="loading">
            <div class="spinner"></div>
          </div>

          <div class="quote-content hidden" id="content">
            <div class="quote-mark" id="quote-mark" title="Click for a new quote">&ldquo;</div>
            <blockquote id="quote-text"></blockquote>
            <div class="divider"></div>
            <cite id="quote-author"></cite>
          </div>
        </div>
      </div>
    </main>

    <div class="toast" id="toast">error loading quote</div>

    <script src="script.js"></script>
  </body>
</html>
