<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Code - Sarris.dev</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    min-height: 100vh;

    background:
      radial-gradient(800px 400px at 10% 10%, rgba(56,189,248,0.18), transparent),
      radial-gradient(800px 400px at 90% 90%, rgba(167,139,250,0.18), transparent);
  }

  .container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;

    background-image: url("https://2.gravatar.com/bg/248931595/156d264684691a181023e71ae7b6240a");
    background-size: cover;
    background-position: center;
    padding: 16px;
  }

  .card-wrapper {
    perspective: 1000px;
  }

  .card {
    position: relative;
    width: 360px;
    border-radius: 16px;
    overflow: hidden;

    background: rgba(0,0,0,0.9);
    color: white;
    text-align: center;

    box-shadow:
      0 25px 50px -12px rgba(0,0,0,0.6);

    transform-style: preserve-3d;
    transition: transform 0.15s ease-out;
  }

  /* shiny overlay (matches Tailwind after:) */
  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;

    background: linear-gradient(
      120deg,
      rgba(255,255,255,0.35),
      rgba(255,255,255,0) 45%
    );

    opacity: 0;
    transition: opacity 0.15s ease-out;
  }

  .card:hover::after {
    opacity: 1;
  }

  .content {
    position: relative;
    padding: 40px 24px;
  }

  .title {
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    margin: 0;

    background-image: url("https://panagiotis2211.wordpress.com/wp-content/uploads/2026/01/lock-screen.jpg");
    background-size: cover;
    background-position: center;

    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: rgb(212,212,216); /* zinc-300 */
  }

.button {
  margin-top: 24px;
  display: inline-flex;
  align-items: center;
  gap: 8px;

  padding: 8px 16px;
  font-size: 12px;
  font-weight: 600;

  border-radius: 9999px;
  text-decoration: none;

  background: #4850E0;
  color: white;

  box-shadow: 0 10px 25px rgba(72, 80, 224, 0.4);

  transition: all 0.2s ease;
}

.button:hover {
  background: #3b42c7; /* slightly darker for hover */
}
</style>
</head>
<body>

<div class="container">
  <div class="card-wrapper">
    <div class="card" id="card">
      <div class="content">
        <h1 class="title">Code</h1>
        <p class="subtitle">This website is used for file hosting/sharing</p>
        <a href="https://www.sarris.dev/" class="button">Go home</a>
      </div>
    </div>
  </div>
</div>

<script>
  const card = document.getElementById("card");

  let currentX = 0;
  let currentY = 0;

  card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const maxTilt = 8;

    const rotateX = ((x - centerX) / centerX) * maxTilt;
    const rotateY = -((y - centerY) / centerY) * maxTilt;

    currentX = rotateX;
    currentY = rotateY;

    card.style.transform =
      `rotateX(${rotateY}deg) rotateY(${rotateX}deg) scale(1.03)`;
  });

  card.addEventListener("mouseleave", () => {
    currentX = 0;
    currentY = 0;

    card.style.transform =
      "rotateX(0deg) rotateY(0deg) scale(1)";
  });
</script>

</body>
</html>
